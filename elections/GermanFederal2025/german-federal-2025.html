<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Bundestagswahl 2025 - Korrelationen</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .controls {
            margin: 20px 0;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
        }

        .chart-container {
            width: 90%;
            margin: 0 auto;
        }

        select {
            margin: 0 10px;
            padding: 5px;
        }
    </style>
</head>

<body>
    <h1>Bundestagswahl 2025: Korrelationen</h1>
    <p>Wähle eine Partei und einen Sozialindikator, um die Daten zu visualisieren.</p>

    <div class="controls">
        <label for="party-select">Partei:</label>
        <select id="party-select"></select>

        <label for="indicator-select">Sozialindikator:</label>
        <select id="indicator-select"></select>

        <button onclick="loadData()">Daten laden</button>
    </div>

    <div class="chart-container">
        <canvas id="correlationChart"></canvas>
    </div>

    <script>
        let correlationChart;
        let electionData = [];
        let structuralData = [];
        let electionHeaders = [];
        let structuralHeaders = [];

        // CSV-Datei laden und Header extrahieren
        async function loadCSV(file) {
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error(`HTTP-Fehler: ${response.status}`);
                const text = await response.text();
                const parsed = Papa.parse(text, {
                    header: true,          // Erste Zeile als Header behandeln
                    delimiter: ",",        // Trennzeichen erzwingen
                    skipEmptyLines: true,  // Leere Zeilen ignorieren
                    encoding: "UTF-8"      // Kodierung festlegen
                });
                if (parsed.errors.length > 0) {
                    console.error("CSV-Parsing-Fehler:", parsed.errors);
                }
                return {
                    data: parsed.data,
                    headers: parsed.meta.fields  // Header (Spaltennamen)
                };
            } catch (error) {
                console.error(`Fehler beim Laden von ${file}:`, error);
                return { data: [], headers: [] };
            }
        }

        // Dropdowns mit Daten aus CSV füllen
        async function initDropdowns() {
            try {
                // CSV-Dateien laden
                const electionResult = await loadCSV("/elections/GermanFederal2025/wahlergebnisse_btw_2025.csv");
                const structuralResult = await loadCSV("/elections/GermanFederal2025/strukturdaten.csv");

                electionData = electionResult.data;
                structuralData = structuralResult.data;

                // Debug: Zeige die Header in der Konsole an
                console.log("Wahlergebnisse-Header:", electionResult.headers);
                console.log("Strukturdaten-Header:", structuralResult.headers);

                // Dropdown für Parteien füllen (alle Header außer "Wahlkreis")
                const partySelect = document.getElementById("party-select");
                partySelect.innerHTML = ''; // Leere bestehende Optionen
                electionResult.headers.forEach(header => {
                    if (header !== "Wahlkreis") {
                        const option = document.createElement("option");
                        option.value = header;
                        option.textContent = header;
                        partySelect.appendChild(option);
                    }
                });

                // Dropdown für Indikatoren füllen (alle Header außer "Wahlkreis")
                const indicatorSelect = document.getElementById("indicator-select");
                indicatorSelect.innerHTML = ''; // Leere bestehende Optionen
                structuralResult.headers.forEach(header => {
                    if (header !== "Wahlkreis") {
                        const option = document.createElement("option");
                        option.value = header;
                        option.textContent = header;
                        indicatorSelect.appendChild(option);
                    }
                });

                console.log("Dropdowns erfolgreich gefüllt!");
            } catch (error) {
                console.error("Fehler in initDropdowns:", error);
            }
        }


        // Daten für ausgewählte Partei/Indikator laden
        function loadData() {
            const party = document.getElementById("party-select").value;
            const indicator = document.getElementById("indicator-select").value;

            if (!party || !indicator) {
                alert("Bitte wähle eine Partei und einen Indikator aus.");
                return;
            }

            // Kombiniere Daten für den Chart
            const combinedData = electionData.map((wahl, i) => {
                const structuralRow = structuralData.find(row => row.Wahlkreis === wahl.Wahlkreis);
                return {
                    wahlkreis: wahl.Wahlkreis,
                    wahlergebnis: wahl[party],
                    indikator: structuralRow ? structuralRow[indicator] : null
                };
            }).filter(item => item.indikator !== null); // Filtere ungültige Einträge

            if (combinedData.length === 0) {
                alert("Keine passenden Daten gefunden. Überprüfe die Wahlkreis-Namen in beiden CSV-Dateien.");
                return;
            }

            drawChart(combinedData, party, indicator);
        }

        // Chart.js-Diagramm erstellen
        function drawChart(data, party, indicator) {
            const ctx = document.getElementById("correlationChart").getContext("2d");
            if (correlationChart) correlationChart.destroy();

            correlationChart = new Chart(ctx, {
                type: "scatter",
                data: {
                    datasets: [{
                        label: `${party} vs. ${indicator}`,
                        data: data.map(item => ({
                            x: item.indikator,
                            y: item.wahlergebnis
                        })),
                        backgroundColor: "rgba(75, 192, 192, 0.6)",
                        borderColor: "rgba(75, 192, 192, 1)",
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: {
                            display: true,
                            text: `Korrelation: ${party} vs. ${indicator}`
                        },
                        tooltip: {
                            callbacks: {
                                label: (context) => {
                                    const point = data[context.dataIndex];
                                    return `${point.wahlkreis}: ${point.indikator.toFixed(2)} vs. ${point.wahlergebnis.toFixed(2)}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: indicator
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: `Wahlergebnis ${party} (%)`
                            },
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        // Seite initialisieren
        document.addEventListener('DOMContentLoaded', initDropdowns);
    </script>
</body>

</html>
