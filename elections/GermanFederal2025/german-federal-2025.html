<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteMetrics</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        nav {
            background: #333;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .dropdown {
            display: inline-block;
            position: relative;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #333;
            min-width: 160px;
            z-index: 1;
        }

        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }

        .dropdown-content a:hover {
            background-color: #575757;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        #content {
            margin: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            min-height: 500px;
        }

        .chart-container {
            width: 90%;
            margin: 0 auto;
        }

        .controls {
            margin: 20px 0;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
        }

        select {
            margin: 0 10px;
            padding: 5px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
    </style>
</head>

<body>
    <nav>
        <a href="javascript:void(0);" onclick="loadContent('home')">Home</a>
        <div class="dropdown">
            <a href="javascript:void(0);">Data</a>
            <div class="dropdown-content">
                <a href="javascript:void(0);" onclick="loadContent('german-federal-2025')">German Federal Election
                    2025</a>
            </div>
        </div>
        <a href="javascript:void(0);" onclick="loadContent('about')">About</a>
    </nav>

    <div id="content">
        <h1>Welcome to VoteMetrics</h1>
        <p>Explore correlations between election results and social/economic indicators.</p>
    </div>

    <script>
    // Supabase Konfiguration
    const SUPABASE_URL = 'https://dein-projekt.supabase.co';
    const SUPABASE_ANON_KEY = 'dein-anon-key';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let correlationChart;

        async function loadContent(page) {
            const contentDiv = document.getElementById('content');

            if (page === 'home') {
                contentDiv.innerHTML = `
                    <h1>Welcome to VoteMetrics</h1>
                    <p>Explore correlations between election results and social/economic indicators.</p>
                `;
            }
            else if (page === 'german-federal-2025') {
                contentDiv.innerHTML = `
                    <h1>Bundestagswahl 2025: Korrelationen</h1>
                    <p>Wähle eine Partei und einen Sozialindikator, um die Daten zu visualisieren.</p>

                    <div class="controls">
                        <label for="party-select">Partei:</label>
                        <select id="party-select"></select>

                        <label for="indicator-select">Sozialindikator:</label>
                        <select id="indicator-select"></select>
                    </div>

                    <div class="chart-container">
                        <canvas id="correlationChart"></canvas>
                    </div>
                `;
                await initDropdowns();
            }
            else if (page === 'about') {
                contentDiv.innerHTML = `
                    <h1>About VoteMetrics</h1>
                    <p>Dieses Tool visualisiert Korrelationen zwischen Wahlergebnissen und sozioökonomischen Indikatoren.</p>
                `;
            }
        }

        async function loadCSV(file) {
            console.log(`loadCSV() called`);
            const response = await fetch(file);
            const text = await response.text();
            return Papa.parse(text, { header: true, delimiter: ",", skipEmptyLines: true });
        }

        async function initDropdowns() {
            try {
                console.log(`initDropdowns() called`);
                const electionResult = await loadCSV("/elections/GermanFederal2025/wahlergebnisse_btw_2025.csv");
                const structuralResult = await loadCSV("/elections/GermanFederal2025/strukturdaten.csv");

                const electionHeaders = electionResult.meta.fields;
                const structuralHeaders = structuralResult.meta.fields;

                const partySelect = document.getElementById("party-select");
                const indicatorSelect = document.getElementById("indicator-select");

                // Dropdown für Parteien füllen
                partySelect.innerHTML = '';
                electionHeaders.forEach(header => {
                    if (header !== "Wahlkreisnummer") {
                        const option = document.createElement("option");
                        option.value = header;
                        option.textContent = header;
                        partySelect.appendChild(option);
                    }
                });

                // Dropdown für Indikatoren füllen
                indicatorSelect.innerHTML = '';
                structuralHeaders.forEach(header => {
                    if (header !== "Wahlkreisnummer") {
                        const option = document.createElement("option");
                        option.value = header;
                        option.textContent = header;
                        indicatorSelect.appendChild(option);
                    }
                });

                // Standardwerte setzen (erste Option)
                if (partySelect.options.length > 0) partySelect.selectedIndex = 0;
                if (indicatorSelect.options.length > 0) indicatorSelect.selectedIndex = 0;

                // Event-Listener hinzufügen
                partySelect.addEventListener("change", loadData);
                indicatorSelect.addEventListener("change", loadData);

                // Daten SOFORT laden
                loadData();

            } catch (error) {
                console.error("Fehler in initDropdowns:", error);
                document.getElementById('content').innerHTML += `
                    <p style="color: red;">Fehler beim Laden der Daten: ${error.message}</p>
                `;
            }
        }

        async function loadData() {
            console.log(`loadData() called`);
            const partySelect = document.getElementById("party-select");
            const indicatorSelect = document.getElementById("indicator-select");

            if (!partySelect || !indicatorSelect) return;

            const party = partySelect.value;
            const indicator = indicatorSelect.value;

            if (!party || !indicator) return;

            try {
                const chartContainer = document.querySelector('.chart-container');
                chartContainer.innerHTML = `
            <canvas id="correlationChart"></canvas>
        `;

                const electionResult = await loadCSV("/elections/GermanFederal2025/wahlergebnisse_btw_2025.csv");
                const structuralResult = await loadCSV("/elections/GermanFederal2025/strukturdaten.csv");
                const electionData = electionResult.data;
                const structuralData = structuralResult.data;

                const combinedData = electionData.map(wahl => {
                    const structuralRow = structuralData.find(row => row.Wahlkreisnummer === wahl.Wahlkreisnummer);
                    if (!structuralRow) return null;

                    // DAS ist die wichtige Änderung: Konvertiere Strings zu Zahlen
                    const wahlergebnis = parseFloat(wahl[party]?.replace(',', '.'));
                    const indikator = parseFloat(structuralRow[indicator]?.replace(',', '.'));

                    // Debug-Ausgabe, um zu sehen was ankommt
                    console.log(`Rohwert: "${wahl[party]}" -> Geparst: ${wahlergebnis}`);
                    console.log(`Rohwert: "${structuralRow[indicator]}" -> Geparst: ${indikator}`);

                    // Nur gültige Zahlenpaare behalten
                    if (isNaN(wahlergebnis) || isNaN(indikator)) {
                        return null;
                    }

                    return {
                        wahlkreis: wahl.Wahlkreisnummer,
                        wahlergebnis: wahlergebnis,
                        indikator: indikator
                    };

                }).filter(item => item !== null);

                if (combinedData.length === 0) {
                    throw new Error("Keine passenden Daten gefunden.");
                }

                drawChart(combinedData, party, indicator);
            } catch (error) {
                console.error("Fehler in loadData:", error);
                document.querySelector('.chart-container').innerHTML = `
            <p style="color: red;">Fehler: ${error.message}</p>
            <canvas id="correlationChart"></canvas>
        `;
            }
        }

        function drawChart(data, party, indicator) {
            console.log(`drawChart() called`);
            const ctx = document.getElementById("correlationChart").getContext("2d");
            if (correlationChart) correlationChart.destroy();

            // R-Wert berechnen
            const rValue = calculateCorrelation(data.map(d => d.indikator), data.map(d => d.wahlergebnis));
            const rSquared = (rValue * rValue).toFixed(3);

            correlationChart = new Chart(ctx, {
                type: "scatter",
                data: {
                    datasets: [{
                        label: `${party} vs. ${indicator}`,
                        data: data.map(item => ({
                            x: item.indikator,
                            y: item.wahlergebnis
                        })),
                        backgroundColor: "rgba(75, 192, 192, 0.6)",
                        borderColor: "rgba(75, 192, 192, 1)",
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: {
                            display: true,
                            text: `Korrelation: ${party} vs. ${indicator}`
                        },
                        subtitle: {
                            display: true,
                            text: `R = ${rValue.toFixed(3)} | R² = ${rSquared}`,
                            position: 'top',
                            align: 'end',
                            color: 'rgba(0, 0, 0, 0.7)',
                            font: {
                                size: 14,
                                weight: 'bold'
                            }
                        }
                    },
                    scales: {
                        x: { title: { display: true, text: indicator } },
                        y: { title: { display: true, text: `Wahlergebnis ${party} (%)` }, beginAtZero: true }
                    }
                }
            });
            console.log(`Chart drawn successfully`);
        }

        // Funktion zur Berechnung der Pearson-Korrelation
        function calculateCorrelation(x, y) {
            const n = x.length;

            // Mittelwerte berechnen
            const meanX = x.reduce((a, b) => a + b, 0) / n;
            const meanY = y.reduce((a, b) => a + b, 0) / n;

            // Summen für Korrelation berechnen
            let sumXY = 0;
            let sumX2 = 0;
            let sumY2 = 0;

            for (let i = 0; i < n; i++) {
                const xDiff = x[i] - meanX;
                const yDiff = y[i] - meanY;
                sumXY += xDiff * yDiff;
                sumX2 += xDiff * xDiff;
                sumY2 += yDiff * yDiff;
            }

            // Korrelation berechnen
            const correlation = sumXY / Math.sqrt(sumX2 * sumY2);
            return correlation;
        }

        window.onload = () => loadContent('home');
    </script>
</body>

</html>
